name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TOKEN_FIXO: ${{ secrets.TOKEN_FIXO }}
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependency installation
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run pytest
        run: |
          python -m pytest app/test

      - name: Run lint
        run: |
          python -m black app/api.py app/test/test_api.py
          python -m pylint app/test app/api.py