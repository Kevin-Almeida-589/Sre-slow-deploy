name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  PythonTests:
    runs-on: ubuntu-latest
    env:
      TOKEN_FIXO: ${{ secrets.TOKEN_FIXO }}
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependency installation
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run pytest
        run: |
          python -m pytest app/test

      - name: Run lint
        run: |
          python -m black app/api.py app/test/test_api.py
          python -m pylint app/test app/api.py --max-line-length=100 --fail-under=9.0  # Pontuação mínima de 9.0

  Docker:
    needs: PythonTests
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -f app/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/sre-deploy:latest .
      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/sre-deploy:latest

      - name: Clean up
        run: |
          docker rmi ${{ secrets.DOCKER_USERNAME }}/sre-deploy:latest