apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: robot-fila-1
spec:
  jobTargetRef:
    backoffLimit: 4
    template:
      spec:
        containers:
          - name: robot
            image: kevinalmeida/simple-google:latest
            env:
              - name: QUEUE_NAME
                value: robot-queue
              - name: RABBITMQHOST
                value: amqp://guest:guest@rabbitmq.default.svc.cluster.local:5672/
        restartPolicy: Never

  pollingInterval: 5
  maxReplicaCount: 10

  triggers:
    - type: rabbitmq
      metadata:
        queueName: robot-queue
        host: amqp://guest:guest@rabbitmq.default.svc.cluster.local:5672/
        queueLength: "1"